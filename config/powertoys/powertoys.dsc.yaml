
properties:
  resources:
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      directives:
        description: Install PowerToys
        allowPrerelease: true
      settings:
        id: Microsoft.PowerToys
        source: winget
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      directives:
        description: Install Everything
        allowPrerelease: true
      settings:
        id: lin-ycv.EverythingPowerToys
        source: winget
    - resource: PowerToysConfigure
      directives:
        description: Configure PowerToys
      settings:
        FancyZones:
          Enabled: true
          FancyzonesShowZoneNumber: false
          FancyzonesAppLastZoneMoveWindows: false
          FancyZonesEditorHotkey: "Win+Shift+F"
        FindMyMouse:
          Enabled: true
          ActivationMethod: 2
        Peek:
          Enabled: false
        AlwaysOnTop:
          Enabled: true
          Hotkey: "Win+Shift+A"
          FrameThickness: 4
          FrameOpacity: 70
        RegistryPreview:
          Enabled: false
        PowerLauncher:
          Enabled: true
          OpenPowerLauncher: "Ctrl+Space"
          UseCentralizedKeyboardHook: true
          SearchQueryTuningEnabled: true
          IgnoreHotkeysInFullscreen: false
          GenerateThumbnailsFromFiles: false
          TabSelectsContextButtons: true
          FancyzonesDisableRoundCornersOnSnap: false
          Position: "Focus"
          Plugins:
            - Name: "Calculator"
              Disabled: false
              IsGlobal: true
            - Name: "Folder"
              Disabled: false
              IsGlobal: true
            - Name: "Program"
              Disabled: false
              IsGlobal: true
            - Name: "Registry Plugin"
              Disabled: true
              ActionKeyword: ":"
            - Name: "Service"
              Disabled: true
            - Name: "Shell"
              Disabled: false
              ActionKeyword: ">"
              IsGlobal: false
            - Name: "Windows System Commands"
              Disabled: false
              IsGlobal: true
            - Name: "URI Handler"
              Disabled: false
              ActionKeyword: "/"
            - Name: "Web Search"
              Disabled: false
              IsGlobal: true
            - Name: "Windows settings"
              Disabled: false
              ActionKeyword: ","
              IsGlobal: false
            - Name: "Everything"
              Disabled: false
              ActionKeyword: "?"
            - Name: "Window Walker"
              Disabled: false
              ActionKeyword: ";"
            - Name: "History"
              Disabled: true
            - Name: "Windows Search"
              Disabled: true
            - Name: "OneNote"
              Disabled: true
            - Name: "PowerToys"
              Disabled: true
            - Name: "Unit Converter"
              Disabled: true
            - Name: "Value Generator"
              Disabled: true
            - Name: "Visual Studio Code Workspaces"
              Disabled: true
            - Name: "Windows Terminal"
              Disabled: true
        ColorPicker:
          Enabled: false
        PowerRename:
          Enabled: false
        ImageResizer:
          Enabled: true
        Awake:
          Enabled: true
        CropAndLock:
          Enabled: false
        EnvironmentVariables:
          Enabled: false
        FileLocksmith:
          Enabled: false
        MouseHighlighter:
          Enabled: false
        MouseJump:
          Enabled: false
        MousePointerCrosshairs:
          Enabled: false
        MouseWithoutBorders:
          Enabled: false
        PowerAccent:
          Enabled: false
        MeasureTool:
          Enabled: false
        Hosts:
          Enabled: false
        PowerOcr:
          Enabled: false
        ShortcutGuide:
          Enabled: false
        PowerPreview:
          EnableSvgPreview: false
          EnableSvgThumbnail: false
          EnableMdPreview: false
          EnableMonacoPreview: false
          EnablePdfPreview: false
          EnablePdfThumbnail: true
          EnableGcodePreview: false
          EnableGcodeThumbnail: true
          EnableStlThumbnail: true
          EnableQoiPreview: false
          EnableQoiThumbnail: true
  configurationVersion: 0.2.0
